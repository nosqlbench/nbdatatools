<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Concept 5: Data Flow — pipeline/funnel shape with binary streams becoming vectors -->
  <defs>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B91C1C"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="g5stream" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#g5)"/>
  <!-- Input data streams (left side, scattered) -->
  <g font-family="monospace" font-size="6" fill="#fff" opacity="0.3">
    <text x="14" y="30">0110</text>
    <text x="14" y="42">1011</text>
    <text x="14" y="54">0010</text>
    <text x="14" y="66">1101</text>
    <text x="14" y="78">0111</text>
    <text x="14" y="90">1000</text>
    <text x="14" y="102">0100</text>
  </g>
  <!-- Converging flow lines -->
  <g fill="none" stroke="url(#g5stream)" stroke-width="1.5">
    <path d="M38,28 C52,28 58,42 68,48"/>
    <path d="M38,40 C52,40 58,46 68,52"/>
    <path d="M38,52 C50,52 58,54 68,58"/>
    <path d="M38,64 C50,64 58,64 68,64"/>
    <path d="M38,76 C50,76 58,74 68,70"/>
    <path d="M38,88 C52,88 58,82 68,76"/>
    <path d="M38,100 C52,100 58,86 68,80"/>
  </g>
  <!-- Central processing node -->
  <rect x="66" y="44" width="8" height="40" rx="4" fill="#fff" opacity="0.15"/>
  <rect x="67" y="46" width="6" height="36" rx="3" fill="#fff" opacity="0.3"/>
  <!-- Output vectors (right side, organized) -->
  <g stroke="#FEF3C7" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <line x1="78" y1="48" x2="108" y2="36"/>
    <line x1="78" y1="56" x2="108" y2="52"/>
    <line x1="78" y1="64" x2="108" y2="64"/>
    <line x1="78" y1="72" x2="108" y2="76"/>
    <line x1="78" y1="80" x2="108" y2="92"/>
  </g>
  <!-- Vector arrow tips -->
  <g fill="#FEF3C7" opacity="0.9">
    <polygon points="108,36 103,33 103,39"/>
    <polygon points="108,52 103,49 103,55"/>
    <polygon points="108,64 103,61 103,67"/>
    <polygon points="108,76 103,73 103,79"/>
    <polygon points="108,92 103,89 103,95"/>
  </g>
  <!-- Accent dots at convergence point -->
  <g fill="#FBBF24" opacity="0.6">
    <circle cx="70" cy="50" r="1.5"/>
    <circle cx="70" cy="58" r="1.5"/>
    <circle cx="70" cy="66" r="1.5"/>
    <circle cx="70" cy="74" r="1.5"/>
  </g>
</svg>
